<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Queen Iyanu</title>
    <link rel="stylesheet" href="style.css">
    <script src="contact.js" defer></script>
</head>

<body>
    <nav class="nav-bar">
        <a href="../homePage/index.html">Home</a>
        <a href="../aboutPage/about.html">About Me</a>
        <a href="../projects/project.html">Projects</a>
        <a href="../goalsPage/goals.html">Goals</a>
        <a href="../resumePage/resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="contact-container">
        <div class="contact-hero">
            <h1>Let's Connect</h1>
            <p>Have a project idea, question, or collaboration in mind? Send a message and Iyanu will get back to you
                soon.</p>
        </div>

        <div class="contact-card">
            <form id="contact-form" action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="from_name" placeholder="Your Name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="reply_to" placeholder="you@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div id="form-status" class="form-status"></div>

            <div class="contact-info">
                <div class="info-card">
                    <h3>Phone</h3>
                    <p>+1 (317) 607-0349</p>
                </div>
                <div class="info-card">
                    <h3>LinkedIn</h3>
                    <p><a href="https://www.linkedin.com/in/iyanuoluwaoyatobo" target="_blank"
                            rel="noopener">linkedin.com/in/iyanuoluwaoyatobo</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
</body>

</html>
